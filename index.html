<!DOCTYPE html>

<head>
    <title>patopro77.github.io</title>
    <link rel="stylesheet" href="style.css">
    <script src="Startup.js"></script>
    <script src="Menu.js"></script>

    <style>
        .StartupStatic {
            position: fixed;
            z-index: 100;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            animation: fadeIn 2s forwards;
            image-rendering: pixelated;
        }

        .BackgroundStatic {
            position: fixed;
            z-index: -98;
            opacity: 0.05;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            image-rendering: pixelated;
        }

        .Gradient {
            z-index: -99;
            position: fixed;
            width: 100%;
            height: 100vh;
            pointer-events: none;

            top: 0px;
            right: 0px;
            background: linear-gradient(to bottom, #2f4e39da 0%, #3758375d 25%, #37583700 50%, #3758375d 75%, #2f4e39da 100%);
        }

        @keyframes fadeIn {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>


<body>
    <img class="StartupStatic" src="Assets/StartupStatic.gif"></img>
    <img class="BackgroundStatic" src="Assets/BackgroundStatic.gif"></img>
    <div class="Gradient"></div>
    <div id="loader" style="position: fixed; z-index: -100; width: 100%; height: 100vh;">
        <script src="NotMine/balatroShader.js"></script>
        <script>
            var color1 = "#fffff"
            const fx = new BalatroShader({
                container: "#loader", speed: 1, contrast: 2, spinAmount: 1, pixelSizeFac: 200, spinEase: 0.25
            });
        </script>
    </div>

    <div class="TopText">
        <div class="ScrollingText">
            PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|PATOPRO77.GITHUB.IO|
        </div>
        <div class="Line"></div>
    </div>
    
    <div class="SideMenu">
        <div class="Title">*Menu</div>

        <button class="WelcomeButton" onclick="OpenPage('Welcome!')">Welcome!</button>
        <button class="LatestNewsButton" onclick="OpenPage('Latest News')">Latest News</button>
        <button class="AboutMeButton" onclick="OpenPage('About Me')">About Me</button>

        <button class="MusicButton">
            <img src="Assets/Unmuted.png" style="image-rendering: pixelated;"></img>
        </button>
    </div>

    <div id="Content">
        <div class="Title">*Welcome!</div>

        <iframe class="Page" id="Welcome!" src="Welcome!.html" frameborder="0"></iframe>
        <iframe class="Page" id="Latest News" src="Latest News.html" frameborder="0" style="display: none;"></iframe>
        <iframe class="Page" id="About Me" src="About Me.html" frameborder="0" style="display: none;"></iframe>
    </div>
</body>
